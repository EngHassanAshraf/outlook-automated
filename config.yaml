# Outlook Automated Configuration File

# Output directory settings
output:
  base_folder: "MV"
  year_format: "MV-{year}"

# Email processing settings
processing:
  # Default behavior for unread emails
  process_unread: false
  # Move processed emails to archive
  archive_processed: true
  # Mark emails as read after processing
  mark_as_read: true

# Category classification settings
categories:
  technical:
    keywords:
      - "الحالة الفنية"
      - "technical"
    name: "Technical Report - التقرير الفني"
  
  daily_report:
    keywords:
      - "اليومي"
      - "اليومى"
      - "الحالة الأمنية"
      - "daily"
    name: "Daily Report - التقرير اليومي"
    sub_categories:
      accommodation:
        keywords:
          - "تواجد الملاك"
          - "mv-nc accommodation"
        name: "Accommodation - تقرير الإقامة"
      
      visitors:
        keywords:
          - "تواجد الزائرين"
        name: "Dayra - تقرير دايرة"
      
      attendance:
        keywords:
          - "الحضور"
          - "الإنصراف"
        name: "الحضور والإنصراف"
      
      mv3:
        keywords:
          - "لموقع Mv3"
          - "السخنة"
        name: "Daily Report - التقرير اليومي"

  external_companies:
    keywords:
      - "الشركة"
      - "شركة"
      - "الشركه"
      - "شركه"
      - "الشركات"
      - "شركات"
      - "الخارجية"
      - "خارجية"
      - "الخارجيه"
      - "خارجيه"
      - "فاتوره"
      - "فاتورة"
      - "فواتير"
    name: "الشركات الخارجية"

  weekly_operations:
    keywords:
      - "التشغيلة"
    name: "التشغيلات الاسبوعية"

  staff:
    keywords:
      - "تعيين"
      - "تعين"
      - "وثقية"
    name: "Staff - الموظفين"

  condolences:
    keywords:
      - "condolences"
    name: "condolences"

  others:
    name: "Others - أخرى"

